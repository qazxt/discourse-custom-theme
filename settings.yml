robotime_logo_url:
  default: ""
  type: string
  description:
    en: "Header logo image URL (theme setting). When set, replaces the default ROBOTIME text in the blue pill."
    zh_CN: "顶栏 Logo 图片 URL（主题设置）。填写后替换蓝色胶囊内的默认 ROBOTIME 文字。"

robotime_nav_links:
  default: "Help|/help,Community Perks|/community-perks,Win Prize|/win-prize,How To|/how-to,About|/about,Buy|https://www.robotime.com"
  type: string
  description:
    en: "Top nav links — theme setting (authoritative). Format: Label|URL, comma-separated. Not read from hub-config.json."
    zh_CN: "顶栏导航链接（以主题设置为准）。格式：标签|URL，英文逗号分隔。不从 hub-config.json 读取。"

robotime_carousel_enabled:
  default: true
  type: bool
  description:
    en: "Show the category carousel below the header. When false, hero_banners from hub-config.json are ignored."
    zh_CN: "是否显示顶栏下方的分类轮播。关闭时忽略 hub-config.json 的 hero_banners。"

robotime_official_events_category:
  default: ""
  type: string
  description:
    en: "Optional category slug for reference (e.g. building sidebar URLs elsewhere). Not auto-wired to hub-config in current JS."
    zh_CN: "可选：活动/官方事件分类 slug（供运营参考）。当前 JS 不会自动写入 hub-config。"

robotime_sidebar_section_title:
  default: "Official Events"
  type: string
  description:
    en: "Sidebar widget section title — theme setting (authoritative). Shown above sidebar_widgets when hub-config provides widgets."
    zh_CN: "侧栏活动区标题（以主题设置为准）。仅当 hub-config.json 提供 sidebar_widgets 时显示在轮播上方。"

robotime_sidebar_view_all_label:
  default: "View All Events"
  type: string
  description:
    en: "Sidebar “view all” link label — theme setting. Used only if robotime_sidebar_view_all_url is non-empty."
    zh_CN: "侧栏「查看全部」链接文案（主题设置）。仅当「查看全部 URL」非空时使用。"

robotime_sidebar_view_all_url:
  default: ""
  type: string
  description:
    en: "Sidebar “view all” URL — theme setting (authoritative). Empty = hide the link below sidebar widgets."
    zh_CN: "侧栏「查看全部」链接地址（以主题设置为准）。留空则不显示该链接。"

robotime_filter_quick_tags:
  default: ""
  type: string
  description:
    en: "Topic list quick tags — theme setting (authoritative). JSON array, e.g. [{\"label\":\"Diy\",\"url\":\"/tag/diy\"}]. Not read from hub-config.json."
    zh_CN: "话题列表预显标签（以主题设置为准）。JSON 数组字符串，如 [{\"label\":\"Diy\",\"url\":\"/tag/diy\"}]。不从 hub-config.json 读取。"
