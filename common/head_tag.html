<script type="text/discourse-plugin" version="1.0">
const CAROUSEL_CARDS = [
  { name: "User Guide & Perks", bg: "#f6ebe3", type: "a", img: "Icon/carousel/1-in.png", rotate: true, dark: false, link: "/c/user-guide-perks" },
  { name: "Crafting Tips & Ideas", bg: "#ffdb04", type: "b", img: null, fallback: "💡", rotate: true, dark: false, link: "/c/crafting-tips-ideas" },
  { name: "Ongoing Events", bg: "#e65e2a", type: "a", img: "Icon/carousel/3-in.png", rotate: false, dark: true, link: "/c/ongoing-events" },
  { name: "Say Hi To Everyone", bg: "#fef7e7", type: "b", img: "Icon/carousel/4-in.png", rotate: false, dark: false, link: "/c/say-hi" },
  { name: "Spin & WIN", bg: "#ffb93e", type: "b", img: "Icon/carousel/5-in.png", backImg: "Icon/carousel/5-back.png", rotate: true, dark: false, link: "/c/spin-and-win" },
  { name: "Showcase & Story", bg: "#582f78", type: "b", img: "Icon/carousel/6-in.png", rotate: false, dark: true, link: "/c/showcase-story" },
  { name: "DIY & Crafting Club", bg: "#fef7e7", type: "c", img: "Icon/carousel/7-in.png", rotate: false, dark: false, link: "/c/diy-crafting-club" },
  { name: "Nanci's Dairy", bg: "#bdb1ff", type: "a", img: "Icon/carousel/8-in.png", rotate: true, dark: false, link: "/c/nancis-dairy" },
  { name: "New Arrivals", bg: "#028be3", type: "a", img: "Icon/carousel/9-in.png", rotate: false, dark: true, link: "/c/new-arrivals" },
  { name: "Exclusive Deals", bg: "#d7c8a2", type: "b", img: "Icon/carousel/10-in.png", rotate: false, dark: false, link: "/c/exclusive-deals" },
  { name: "Instruction Manual", bg: "#fef7e7", type: "c", img: "Icon/carousel/11-in.png", rotate: false, dark: false, link: "/c/instruction-manual" }
];

function initCarousel() {
  const track = document.getElementById("carousel-track");
  const prevBtn = document.getElementById("carousel-prev");
  const nextBtn = document.getElementById("carousel-next");

  if (!track) return;
  if (track.children.length > 0) return;

  CAROUSEL_CARDS.forEach((card) => {
    const el = document.createElement("a");
    el.href = card.link;
    el.className = `robotime-carousel__card ${card.rotate ? "robotime-carousel__card--rotate" : "robotime-carousel__card--no-rotate"}`;

    let bodyStyle = '';
    let bodyContent = '';
    const labelStyle = card.dark ? ' style="color:#fff"' : '';

    if (card.type === 'a') {
      bodyStyle = `background: ${card.bg}`;
      bodyContent = `
        <div class="robotime-carousel__card-icon-overflow">
          <img src="${card.img}" alt="${card.name}">
        </div>
        <div class="robotime-carousel__card-label"${labelStyle}>${card.name}</div>`;
    } else if (card.type === 'b') {
      bodyStyle = card.backImg
        ? `background: url('${card.backImg}') center/cover no-repeat, ${card.bg}`
        : `background: ${card.bg}`;
      const iconHtml = card.img
        ? `<img src="${card.img}" alt="${card.name}">`
        : `<span class="card-icon">${card.fallback || ''}</span>`;
      bodyContent = `
        <div class="robotime-carousel__card-icon-center">${iconHtml}</div>
        <div class="robotime-carousel__card-label"${labelStyle}>${card.name}</div>`;
    } else if (card.type === 'c') {
      bodyStyle = `background: url('${card.img}') center/cover no-repeat`;
      bodyContent = `<div class="robotime-carousel__card-label">${card.name}</div>`;
    }

    el.innerHTML = `<div class="robotime-carousel__card-body type-${card.type}" style="${bodyStyle}">${bodyContent}</div>`;

    track.appendChild(el);
  });

  let scrollPos = 0;
  const cardWidth = 158;
  const visibleCards = Math.floor(track.parentElement.offsetWidth / cardWidth);
  const maxScroll = (CAROUSEL_CARDS.length - visibleCards) * cardWidth;

  function updatePosition() {
    track.style.transform = `translateX(-${scrollPos}px)`;
  }

  if (prevBtn) {
    prevBtn.addEventListener("click", () => {
      scrollPos = Math.max(0, scrollPos - cardWidth * 2);
      updatePosition();
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      scrollPos = Math.min(maxScroll, scrollPos + cardWidth * 2);
      updatePosition();
    });
  }
}

function initMobileMenu() {
  const menuBtn = document.querySelector(".robotime-header__mobile-menu-btn");
  const mobileNav = document.querySelector(".robotime-mobile-nav");
  if (!menuBtn || !mobileNav) return;

  menuBtn.addEventListener("click", () => {
    mobileNav.classList.toggle("robotime-mobile-nav--open");
    const isOpen = mobileNav.classList.contains("robotime-mobile-nav--open");
    menuBtn.setAttribute("aria-expanded", isOpen);
  });

  mobileNav.querySelectorAll("a").forEach((link) => {
    link.addEventListener("click", () => {
      mobileNav.classList.remove("robotime-mobile-nav--open");
      menuBtn.setAttribute("aria-expanded", "false");
    });
  });
}

function determineImageRatio(width, height) {
  if (!width || !height) return "square";
  const ratio = width / height;
  return ratio > 0.85 ? "square" : "portrait";
}

api.onPageChange(() => {
  requestAnimationFrame(() => {
    initCarousel();
    initMobileMenu();
  });
});
</script>
