<script type="text/discourse-plugin" version="1.0">
// ============================================================
// Robotime Community Theme — Plugin-Driven Initializer
// All dynamic data comes from /hub-config.json (provided by plugin)
// ============================================================

function renderNavLinks(container, navItems) {
  if (!container || !navItems) return;
  container.innerHTML = '';
  navItems.forEach(item => {
    const a = document.createElement('a');
    a.href = item.url;
    a.className = 'robotime-header__nav-link';
    a.textContent = item.label;
    if (item.is_external) {
      a.target = '_blank';
      a.rel = 'noopener';
    }
    container.appendChild(a);
  });
}

function renderCarousel(track, heroBanners) {
  if (!track || !heroBanners) return;
  track.innerHTML = '';

  function isDark(hex) {
    const c = String(hex || '').replace('#', '');
    if (c.length !== 6) return false;
    const r = parseInt(c.slice(0, 2), 16);
    const g = parseInt(c.slice(2, 4), 16);
    const b = parseInt(c.slice(4, 6), 16);
    return (r * 0.299 + g * 0.587 + b * 0.114) < 160;
  }

  heroBanners.forEach(card => {
    const el = document.createElement('a');
    el.href = card.link_url || '#';
    el.className = 'robotime-carousel__card';
    const bgClass = isDark(card.bg_color || '#f6ebe3') ? 'dark-bg' : 'light-bg';

    el.innerHTML = `
      <div class="robotime-carousel__card-body" style="background-color: ${card.bg_color || '#f6ebe3'}">
        <div class="robotime-carousel__card-img" style="background-image: url('${card.image_url}')"></div>
        <div class="robotime-carousel__card-label ${bgClass}">${card.title}</div>
      </div>`;

    el.addEventListener('mousedown', () => el.classList.add('is-pressed'));
    el.addEventListener('mouseup',   () => el.classList.remove('is-pressed'));
    el.addEventListener('mouseleave',() => el.classList.remove('is-pressed'));

    track.appendChild(el);
  });

  // Carousel scroll logic
  let scrollPos = 0;
  const prevBtn = document.getElementById('carousel-prev');
  const nextBtn = document.getElementById('carousel-next');

  function getStep() {
    const card = track.querySelector('.robotime-carousel__card');
    if (!card) return 290;
    const styles = window.getComputedStyle(track);
    const gap = parseFloat(styles.gap || styles.columnGap || '0') || 0;
    return card.getBoundingClientRect().width + gap;
  }
  function getMaxScroll() {
    const step = getStep();
    const visible = Math.floor(track.parentElement.offsetWidth / step);
    return Math.max(0, (heroBanners.length - visible) * step);
  }
  function updatePos() {
    track.style.transform = `translateX(-${scrollPos}px)`;
  }

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      scrollPos = Math.max(0, scrollPos - getStep() * 2);
      updatePos();
    });
  }
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      scrollPos = Math.min(getMaxScroll(), scrollPos + getStep() * 2);
      updatePos();
    });
  }
}

function renderSidebarWidgets(container, widgets) {
  if (!container || !widgets || widgets.length === 0) return;
  container.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'robotime-sidebar-widget';

  if (widgets.length === 1) {
    const w = widgets[0];
    wrapper.innerHTML = `
      <a href="${w.link_url || '#'}" class="robotime-sidebar-widget__card">
        <img src="${w.image_url}" alt="${w.title}">
        <div class="robotime-sidebar-widget__title">${w.title}</div>
      </a>`;
  } else {
    let idx = 0;
    const buildSlide = () => {
      const w = widgets[idx];
      wrapper.innerHTML = `
        <a href="${w.link_url || '#'}" class="robotime-sidebar-widget__card">
          <img src="${w.image_url}" alt="${w.title}">
          <div class="robotime-sidebar-widget__title">${w.title}</div>
        </a>
        <div class="robotime-sidebar-widget__dots">
          ${widgets.map((_, i) => `<span class="robotime-sidebar-widget__dot${i === idx ? ' active' : ''}"></span>`).join('')}
        </div>`;
    };
    buildSlide();
    setInterval(() => {
      idx = (idx + 1) % widgets.length;
      buildSlide();
    }, 5000);
  }

  container.appendChild(wrapper);
}

function initMobileMenu() {
  const menuBtn = document.querySelector('.robotime-header__mobile-menu-btn');
  const mobileNav = document.querySelector('.robotime-mobile-nav');
  if (!menuBtn || !mobileNav) return;

  menuBtn.addEventListener('click', () => {
    mobileNav.classList.toggle('robotime-mobile-nav--open');
  });
  mobileNav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      mobileNav.classList.remove('robotime-mobile-nav--open');
    });
  });
}

// Main initialization
api.onPageChange(() => {
  requestAnimationFrame(() => {
    initMobileMenu();

    const navContainer = document.querySelector('.robotime-header__nav');
    const carouselTrack = document.getElementById('carousel-track');
    const carouselRoot = document.getElementById('robotime-carousel');
    const sidebarSlot = document.querySelector('.robotime-sidebar-widget-slot');

    // Collapsed ↔ expanded state (scroll)
    if (carouselRoot && !window.__robotimeCarouselCollapseInit) {
      window.__robotimeCarouselCollapseInit = true;
      let collapsed = false;
      let rafId = null;

      const update = () => {
        rafId = null;
        const shouldCollapse = window.scrollY > 60;
        if (shouldCollapse === collapsed) return;
        collapsed = shouldCollapse;
        carouselRoot.classList.toggle('robotime-carousel--collapsed', collapsed);
      };

      window.addEventListener('scroll', () => {
        if (rafId) return;
        rafId = window.requestAnimationFrame(update);
      }, { passive: true });

      update();
    }

    // Fetch plugin config
    fetch('/hub-config.json')
      .then(r => r.json())
      .then(config => {
        if (config.nav_items)       renderNavLinks(navContainer, config.nav_items);
        if (config.hero_banners)    renderCarousel(carouselTrack, config.hero_banners);
        if (config.sidebar_widgets) renderSidebarWidgets(sidebarSlot, config.sidebar_widgets);
      })
      .catch(() => {
        console.warn('[Robotime Theme] hub-config.json not available — plugin may be disabled.');
      });
  });
});
</script>
