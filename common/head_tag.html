<script type="text/discourse-plugin" version="1.0">
// ============================================================
// Robotime Community Theme — Plugin-Driven Initializer
// All dynamic data comes from /hub-config.json (provided by plugin)
// ============================================================

function renderNavLinks(container, navItems) {
  if (!container || !navItems) return;
  container.innerHTML = '';
  navItems.forEach(item => {
    const a = document.createElement('a');
    a.href = item.url;
    a.className = 'robotime-header__nav-link';
    a.textContent = item.label;
    if (item.is_external) {
      a.target = '_blank';
      a.rel = 'noopener';
    }
    container.appendChild(a);
  });
}

function renderCarousel(track, heroBanners) {
  if (!track || !heroBanners) return;
  track.innerHTML = '';

  heroBanners.forEach(card => {
    const el = document.createElement('a');
    el.href = card.link_url || '#';
    el.className = 'robotime-carousel__card';

    el.innerHTML = `
      <div class="robotime-carousel__card-body" style="background: url('${card.image_url}') center/cover no-repeat, ${card.bg_color || '#f6ebe3'}">
        <div class="robotime-carousel__card-label">${card.title}</div>
      </div>`;

    el.addEventListener('mousedown', () => el.classList.add('is-pressed'));
    el.addEventListener('mouseup',   () => el.classList.remove('is-pressed'));
    el.addEventListener('mouseleave',() => el.classList.remove('is-pressed'));

    track.appendChild(el);
  });

  // Carousel scroll logic
  let scrollPos = 0;
  const cardWidth = 290;
  const prevBtn = document.getElementById('carousel-prev');
  const nextBtn = document.getElementById('carousel-next');

  function getMaxScroll() {
    const visible = Math.floor(track.parentElement.offsetWidth / cardWidth);
    return Math.max(0, (heroBanners.length - visible) * cardWidth);
  }
  function updatePos() {
    track.style.transform = `translateX(-${scrollPos}px)`;
  }

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      scrollPos = Math.max(0, scrollPos - cardWidth * 2);
      updatePos();
    });
  }
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      scrollPos = Math.min(getMaxScroll(), scrollPos + cardWidth * 2);
      updatePos();
    });
  }
}

function renderSidebarWidgets(container, widgets) {
  if (!container || !widgets || widgets.length === 0) return;
  container.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'robotime-sidebar-widget';

  if (widgets.length === 1) {
    const w = widgets[0];
    wrapper.innerHTML = `
      <a href="${w.link_url || '#'}" class="robotime-sidebar-widget__card">
        <img src="${w.image_url}" alt="${w.title}">
        <div class="robotime-sidebar-widget__title">${w.title}</div>
      </a>`;
  } else {
    let idx = 0;
    const buildSlide = () => {
      const w = widgets[idx];
      wrapper.innerHTML = `
        <a href="${w.link_url || '#'}" class="robotime-sidebar-widget__card">
          <img src="${w.image_url}" alt="${w.title}">
          <div class="robotime-sidebar-widget__title">${w.title}</div>
        </a>
        <div class="robotime-sidebar-widget__dots">
          ${widgets.map((_, i) => `<span class="robotime-sidebar-widget__dot${i === idx ? ' active' : ''}"></span>`).join('')}
        </div>`;
    };
    buildSlide();
    setInterval(() => {
      idx = (idx + 1) % widgets.length;
      buildSlide();
    }, 5000);
  }

  container.appendChild(wrapper);
}

function initMobileMenu() {
  const menuBtn = document.querySelector('.robotime-header__mobile-menu-btn');
  const mobileNav = document.querySelector('.robotime-mobile-nav');
  if (!menuBtn || !mobileNav) return;

  menuBtn.addEventListener('click', () => {
    mobileNav.classList.toggle('robotime-mobile-nav--open');
  });
  mobileNav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      mobileNav.classList.remove('robotime-mobile-nav--open');
    });
  });
}

// Main initialization
api.onPageChange(() => {
  requestAnimationFrame(() => {
    initMobileMenu();

    const navContainer = document.querySelector('.robotime-header__nav');
    const carouselTrack = document.getElementById('carousel-track');
    const sidebarSlot = document.querySelector('.robotime-sidebar-widget-slot');

    // Fetch plugin config
    fetch('/hub-config.json')
      .then(r => r.json())
      .then(config => {
        if (config.nav_items)       renderNavLinks(navContainer, config.nav_items);
        if (config.hero_banners)    renderCarousel(carouselTrack, config.hero_banners);
        if (config.sidebar_widgets) renderSidebarWidgets(sidebarSlot, config.sidebar_widgets);
      })
      .catch(() => {
        console.warn('[Robotime Theme] hub-config.json not available — plugin may be disabled.');
      });
  });
});
</script>
